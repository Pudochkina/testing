name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  smoke-tests:
    name: Smoke Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: npm run test:smoke
        env:
          ENABLE_FLAKY: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          FLAKY_MIN: 2
          FLAKY_MAX: 5

      - name: Transform Results to JSON
        if: always()
        run: node .github/scripts/transform-results.js
        env:
          PLAYWRIGHT_REPORT_PATH: test-results/results.json
          PAYLOAD_OUTPUT_PATH: test-results-payload-smoke.json
          JOB_NAME: smoke-tests
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload Payload as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webhook-payload-smoke
          path: test-results-payload-smoke.json
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  functional-tests:
    name: Functional Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Functional Tests
        run: npx playwright test --grep "@functional"
        env:
          ENABLE_FLAKY: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          FLAKY_MIN: 5
          FLAKY_MAX: 10

      - name: Transform Results to JSON
        if: always()
        run: node .github/scripts/transform-results.js
        env:
          PLAYWRIGHT_REPORT_PATH: test-results/results.json
          PAYLOAD_OUTPUT_PATH: test-results-payload-functional.json
          JOB_NAME: functional-tests
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload Payload as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webhook-payload-functional
          path: test-results-payload-functional.json
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  ui-ux-tests:
    name: UI/UX Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run UI/UX Tests
        run: npx playwright test --grep "@ui-ux"
        env:
          ENABLE_FLAKY: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          FLAKY_MIN: 1
          FLAKY_MAX: 3

      - name: Transform Results to JSON
        if: always()
        run: node .github/scripts/transform-results.js
        env:
          PLAYWRIGHT_REPORT_PATH: test-results/results.json
          PAYLOAD_OUTPUT_PATH: test-results-payload-ui-ux.json
          JOB_NAME: ui-ux-tests
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload Payload as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webhook-payload-ui-ux
          path: test-results-payload-ui-ux.json
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-ux-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  send-results:
    name: Send Results to Monitoring
    needs: [smoke-tests, functional-tests, ui-ux-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: List downloaded artifacts
        run: |
          find all-results/ -type f
          echo "Total files: $(find all-results/ -type f | wc -l)"

      - name: Transform Results to JSON
        if: always()
        run: node .github/scripts/transform-results.js
        env:
          RESULTS_PATH: all-results/
          PAYLOAD_OUTPUT_PATH: test-results-payload.json
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload Payload as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webhook-payload
          path: test-results-payload.json
          retention-days: 30

      - name: Send to Monitoring Server
        if: always() && env.WEBHOOK_URL != ''
        run: node .github/scripts/send-webhook.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PAYLOAD_PATH: test-results-payload.json
